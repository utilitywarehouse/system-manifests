apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: onepassword-connect-operator
rules:
  # needed to add finalizers when secret annotations are added to deployment
  - apiGroups:
      - apps
    resources:
      - deployments/finalizers
      - daemonsets/finalizers
      - statefulsets/finalizers
    verbs:
      - update

  - apiGroups:
      - ""
    resources:
      # - pods
      # - services
      # - services/finalizers
      # - endpoints
      # - persistentvolumeclaims
      # - events
      # - configmaps
      - secrets
      # - namespaces
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch

  # - apiGroups:
  #     - apps
  #   resources:
  #     - deployments
  #     - daemonsets
  #     - replicasets
  #     - statefulsets
  #   verbs:
  #     - create
  #     - delete
  #     - get
  #     - list
  #     - patch
  #     - update
  #     - watch

  - apiGroups:
      - apps
    resourceNames:
      - onepassword-connect-operator
    resources:
      - deployments/finalizers
    verbs:
      - update

  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get

  # - apiGroups:
  #     - apps
  #   resources:
  #     - replicasets
  #     - deployments
  #   verbs:
  #     - get

  - apiGroups:
      - onepassword.com
    resources:
      - "*"
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
