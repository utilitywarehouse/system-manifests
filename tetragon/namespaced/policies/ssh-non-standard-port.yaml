# Falco rule:  Disallowed SSH Connection Non Standard Port
#
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: ssh-non-standard-port
  annotations:
    description: >
      Detects outbound connections on non-standard ports commonly used for SSH
      reverse shells or protocol tunneling.
      Translated from Falco rule: "Disallowed SSH Connection Non Standard Port".
      MITRE: T1048 - Exfiltration Over Alternative Protocol, T1572 - Protocol Tunneling.

      Port strategy:
        High-suspicion ports (53, 88, 4444): no binary filter — any process connecting
        to these is worth knowing about regardless of binary name or path.

        Noisier ports (80, 443, 8080, 8443): scoped to known SSH binary paths to avoid
        excessive kprobe overhead. Binary path regex filtering is applied at the
        allowlist export layer (binary_regex in tetragon-config-patch.yaml) as the
        final gate, since matchBinaries only supports exact paths.

        NOTE: Port 88 appears only in the high-suspicion kprobe — removing it from
        the noisier-ports kprobe avoids firing two events when an SSH binary connects
        to port 88.

        NOTE: On Flatcar hosts this is not a concern as /usr is immutable and ssh
        is always at /usr/bin/ssh. For containers, the allowlist binary_regex catches
        any path ending in /ssh, /scp, or /sftp.

      Return value: 0 on successful connection initiation, negative errno on immediate
      failure. A failed attempt (e.g. ECONNREFUSED) still indicates the process tried
      to reach that port.
spec:
  kprobes:
    # High-suspicion ports: no binary filter needed.
    # Very few legitimate processes connect to 53/88/4444 via tcp_connect.
    - call: "tcp_connect"
      syscall: false
      return: true
      message: "Outbound connection to high-suspicion port"
      args:
        - index: 0
          type: "sock"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "DPort"
              values:
                - "53" # DNS — SSH tunneling here is always suspicious
                - "88" # Kerberos — rarely used for legitimate SSH
                - "4444" # Metasploit/reverse shell default port
          matchActions:
            - action: Post

    # Noisier ports: restrict to known SSH binary paths at the kprobe level
    # to avoid firing on the high volume of legitimate HTTP/HTTPS traffic.
    # The allowlist binary_regex in tetragon-config-patch.yaml acts as an
    # additional gate using regex (covers any path ending in /ssh, /scp, /sftp).
    # Port 88 intentionally omitted here — already covered unconditionally above.
    - call: "tcp_connect"
      syscall: false
      return: true
      message: "SSH binary connecting to non-standard port"
      args:
        - index: 0
          type: "sock"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "DPort"
              values:
                - "80"
                - "443"
                - "8080"
                - "8443"
          matchBinaries:
            - operator: "In"
              values:
                # Flatcar host and most container distros (Alpine, Debian, Ubuntu)
                - /usr/bin/ssh
                - /usr/bin/scp
                - /usr/bin/sftp
                - /usr/bin/ssh-keyscan
                # Fallback paths for manual installs or older base images
                - /bin/ssh
                - /bin/scp
                - /bin/sftp
                - /usr/local/bin/ssh
                - /usr/local/bin/scp
                - /usr/local/bin/sftp
          matchActions:
            - action: Post
