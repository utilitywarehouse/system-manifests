apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: anomalous-tcp-egress
  annotations:
    description: >
      Detects outbound TCP connections to legacy Windows/botnet ports and protocol
      anomalies that are highly suspicious in Linux container environments.
      MITRE: T1048 - Exfiltration Over Alternative Protocol, T1572 - Protocol Tunneling.
spec:
  kprobes:
    - call: "tcp_connect"
      syscall: false
      return: true
      message: "Outbound TCP connection to high-suspicion or anomalous port"
      args:
        - index: 0
          type: "sock"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "DPort"
              values:
                # Protocol anomalies (TCP is highly suspicious here)
                - "69"  # TFTP
                - "123" # NTP
                # Legacy/Windows/botnet ports — anomalous in Linux container environments
                - "88"   # Kerberos
                - "139"  # SMB / NetBIOS
                - "445"  # SMB / CIFS
                - "3389" # RDP
                - "6667" # IRC
          matchActions:
            - action: Post
              rateLimit: "1s"
              rateLimitScope: "process"
