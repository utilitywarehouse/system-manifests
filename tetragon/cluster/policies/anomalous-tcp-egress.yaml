apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: anomalous-tcp-egress
  annotations:
    description: >
      Detects outbound TCP connections to protocol anomalies (UDP-dominant ports
      like DNS/NTP/TFTP) and legacy Windows/botnet ports highly suspicious in pure
      Linux environments.
      MITRE: T1048 - Exfiltration Over Alternative Protocol, T1572 - Protocol Tunneling.
spec:
  kprobes:
    - call: "tcp_connect"
      syscall: false
      return: true
      message: "Outbound TCP connection to high-suspicion or anomalous port"
      args:
        - index: 0
          type: "sock"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "DPort"
              values:
                # Protocol Anomalies (TCP is highly suspicious here)
                - "53" # DNS TCP fallback (CoreDNS excluded below)
                - "69" # TFTP
                - "123" # NTP
                # Legacy/Windows/Botnet Ports
                - "88" # Kerberos
                - "139" # SMB / NetBIOS
                - "445" # SMB / CIFS
                - "3389" # RDP
                - "6667" # IRC
          matchBinaries:
            - operator: "NotIn"
              values:
                - /coredns
                - /usr/lib/systemd/systemd-resolved
          matchActions:
            - action: Post
              rateLimit: "1s"
              rateLimitScope: "process"
