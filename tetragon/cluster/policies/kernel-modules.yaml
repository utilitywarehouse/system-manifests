# source
# https://github.com/cilium/tetragon/blob/main/examples/policylibrary/modules.yaml
#
# This tracing policy monitors kernel modules operations.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: "monitor-kernel-modules"
  annotations:
    description: "Monitor kernel modules operations"
spec:
  kprobes:
    - call: "security_kernel_module_request"
      message: "Kernel module requested and is being loaded automatically"
      syscall: false
      return: true
      args:
        - index: 0
          type: "string"
      returnArg:
        index: 0
        type: "int"
      selectors:
        # Suppress: kernel netdev autoload fires request_module("netdev-<ifname>") for every
        # new interface. Calico creates cali<hash> veth pairs per pod, generating constant
        # noise. Scoped to udevadm and ip to preserve visibility if other tools request
        # a module genuinely named cali*.
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "cali"
                - "netdev-cali"
          matchBinaries:
            - operator: "In"
              values:
                - /usr/bin/udevadm
                - /usr/sbin/ip
          matchActions:
            - action: "NoPost"

        - matchArgs:
            - index: 0
              operator: "NotEqual"
              values:
                # Multipath TCP over IPv4
                - "net-pf-2-proto-262"
                - "net-pf-2-proto-262-type-1"
          matchReturnArgs:
            - index: 0
              operator: "Equal"
              values:
                - "0" # LSM allowed the auto-load; denied attempts are not a threat signal
          matchBinaries:
            - operator: "NotIn"
              values:
                # Suppress: mount.nfs requests rpc-auth-gss-<oid> for Kerberos GSSAPI on every NFS
                # mount. All module requests from mount.nfs are GSSAPI/RPC-related and legitimate.
                - /sbin/mount.nfs
          matchActions:
            - action: Post
              rateLimit: "1s"
              rateLimitScope: "process"

    - call: "security_kernel_read_file"
      message: "Kernel module is being loaded"
      # Explicit module loading using file descriptor finit_module() to print module full path
      syscall: false
      return: true
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "int"
      returnArg:
        index: 0
        type: "int"
      # On Flatcar, /usr is immutable so all legitimate .ko files live under
      # /usr/lib/modules/. A module loaded from anywhere else (tmpfs, /tmp,
      # a container overlay) is a strong indicator of a kernel rootkit attempt.
      # The file path in the event makes this easy to triage.
      selectors:
        - matchArgs:
            - index: 1
              operator: "Equal"
              values:
                - "2" # READING_MODULE
          matchReturnArgs:
            - index: 0
              operator: "Equal"
              values:
                - "0" # LSM allowed the load; denied attempts (AppArmor/SELinux) are less actionable
          matchActions:
            - action: Post
              rateLimit: "1s"
              rateLimitScope: "process"
