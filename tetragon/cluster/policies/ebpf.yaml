# source
# https://github.com/cilium/tetragon/blob/main/examples/policylibrary/bpf.yaml
#
# Tuned for Kubernetes on Flatcar with Kyverno enforcing:
#   - allowPrivilegeEscalation: false (no_new_privs on all containers)
#   - CAP_BPF and CAP_PERFMON blocked from being added (not in OCI default set)
#
# bpf_check and security_bpf_map_create act as Kyverno bypass tripwires:
# the kernel gates both calls behind CAP_BPF before invoking them, so a
# container reaching either hook has a capability Kyverno should have blocked.
#
# Binary exclusions use exact path matching only (no followChildren).
# Tetragon allows at most one matchBinaries entry per selector, making it
# impossible to apply followChildren selectively (e.g. calico but not runc).
# Keeping followChildren off preserves visibility into container workloads
# (all children of runc) at the cost of some noise from calico child
# processes (felix, bird) that legitimately create BPF maps.
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: "bpf-library-policy"
spec:
  kprobes:
    # 1. BPF PROGRAM LOAD (VERIFIER CHECK)
    - call: "bpf_check"
      syscall: false
      return: true
      args:
        - index: 1
          type: "bpf_attr"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchReturnArgs:
            - index: 0
              operator: "Equal"
              values:
                - "0" # 0 means the verifier accepted the BPF program
          matchBinaries:
            - operator: "NotIn"
              values:
                - /usr/bin/bpftool
                - /usr/bin/calico-node
                - /usr/bin/runc
                - /usr/bin/tetragon
                - /usr/lib/systemd/systemd
          matchActions:
            - action: Post
              rateLimit: "1s"
              rateLimitScope: "process"

    - call: "security_perf_event_alloc"
      syscall: false
      return: true
      args:
        - index: 0
          type: "perf_event"
      returnArg:
        index: 0
        type: "int"
      # Scoped to processes holding CAP_PERFMON or CAP_SYS_ADMIN rather than
      # binary exclusions. Software perf events (PERF_TYPE_SOFTWARE) are
      # accessible without any capability, so binary-only exclusions generate
      # noise from every JVM, Go runtime, and Node.js v8 profiler. Kyverno
      # blocks CAP_PERFMON, so any container hitting this hook is an exception
      # workload or a Kyverno bypass.
      selectors:
        - matchCapabilities:
            - type: Effective
              operator: In
              values:
                - "CAP_PERFMON"
                - "CAP_SYS_ADMIN"
          matchReturnArgs:
            - index: 0
              operator: "Equal"
              values:
                - "0"
          matchBinaries:
            - operator: "NotIn"
              values:
                - /usr/bin/tetragon
                - /usr/local/bin/arc-harden-runner
          matchActions:
            - action: Post

    - call: "security_bpf_map_create" # Called during bpf map create, Linux 6.9+
      syscall: false
      return: true
      args:
        - index: 0
          type: "bpf_map"
      returnArg:
        index: 0
        type: "int"
      ignore:
        callNotFound: true
      selectors:
        - matchReturnArgs:
            - index: 0
              operator: "Equal"
              values:
                - "0" # 0 means the map was successfully created
          matchBinaries:
            - operator: "NotIn"
              values:
                - /usr/bin/bpftool
                - /usr/bin/calico-node
                - /usr/bin/runc
                - /usr/bin/tetragon
                - /usr/local/bin/arc-harden-runner
          matchActions:
            - action: Post
              rateLimit: "1s"
              rateLimitScope: "process"

    - call: "security_file_permission"
      syscall: false
      return: true
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "int" # 0x04 is MAY_READ, 0x02 is MAY_WRITE
      returnArg:
        index: 0
        type: "int"
      # MAY_READ dropped: any process reading a pinned BPF map or program from
      # /sys/fs/bpf fires this — monitoring tools, bpftool, tetragon itself.
      # Low security signal relative to the noise. MAY_WRITE retained: writing
      # to the BPF filesystem is inherently suspicious outside of known tools.
      selectors:
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/sys/fs/bpf"
            - index: 1
              operator: "Equal"
              values:
                - "2" # MAY_WRITE only
          matchBinaries:
            - operator: "NotIn"
              values:
                - /usr/bin/calico-node
              followChildren: true
          matchActions:
            - action: Post
              rateLimit: "1s"
              rateLimitScope: "process"

    - call: "security_mmap_file"
      syscall: false
      return: true
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "ulong" # prot flags PROT_READ(0x01), PROT_WRITE(0x02), PROT_EXEC(0x04)
        - index: 2
          type: "ulong" # mmap flags MAP_SHARED(0x01), MAP_PRIVATE(0x02)
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/sys/fs/bpf"
            - index: 1
              operator: "Equal"
              values:
                - "1" # PROT_READ
            - index: 2
              operator: "Mask"
              values:
                - "1" # MAP_SHARED
          matchBinaries:
            - operator: "NotIn"
              values:
                - /usr/bin/calico-node
                - /usr/bin/tetragon
              followChildren: true
          matchActions:
            - action: Post
              rateLimit: "1s"
              rateLimitScope: "process"
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/sys/fs/bpf"
            - index: 1
              operator: "Mask"
              values:
                - "2" # PROT_WRITE
            - index: 2
              operator: "Mask"
              values:
                - "1" # MAP_SHARED
          matchBinaries:
            - operator: "NotIn"
              values:
                - /usr/bin/calico-node
                - /usr/bin/tetragon
              followChildren: true
          matchActions:
            - action: Post
              rateLimit: "1s"
              rateLimitScope: "process"
