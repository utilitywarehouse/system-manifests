# modified version of
# https://github.com/cilium/tetragon/blob/main/examples/quickstart/file_monitoring.yaml
# Falco rule: Read sensitive file (trusted after startup / untrusted)
#
apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: sensitive-file-access
  annotations:
    description: >
      Detects opens, truncations, writes, and write-via-mmap of sensitive files
      and system directories.

      Rule 1 (security_file_open): opens of specific sensitive files
      Translated from Falco rules: "Read sensitive file untrusted",
      "Read sensitive file trusted after startup".
      MITRE: T1555 - Credentials from Password Stores.

      Rule 2 (security_file_permission MAY_WRITE): actual write I/O to targeted
      sensitive paths (auth files, sudoers, PAM, SSH config, k8s config, cron,
      shell startup files, ld.so, binary directories, /root/.ssh).
      Scoped to specific subpaths rather than all of /etc to avoid noise from
      legitimate services writing temp files under /etc. MAY_READ excluded.

      Rule 3 (security_mmap_file MAP_SHARED+PROT_WRITE): write-via-mmap to the
      same targeted paths. MAP_PRIVATE excluded (copy-on-write, no file mutation).

      Rule 4 (security_path_truncate): truncate() bypasses security_file_open
      entirely. Broad /etc scope is acceptable here — truncating anything under
      /etc is inherently suspicious unlike writes which have legitimate use cases.

      LSM hooks (not syscall hooks) are used throughout to avoid TOCTOU:
      hooks fire after VFS path resolution using kernel-space struct file *,
      so user-space cannot race the path between check and use.
spec:
  kprobes:
    # -------------------------------------------------------------------------
    # Rule 1: Open sensitive file
    #
    # security_file_open fires after VFS path resolution — no TOCTOU.
    # Covers all open variants (open, openat, openat2) in one hook.
    # Return value: 0 = allowed, negative errno = denied by LSM.
    #
    # Scoped to the host mount namespace (matchNamespaces Mnt=host_ns): a read of
    # these paths inside a container hits either the container's own copies
    # (meaningless) or hostPath-mounted host files from pods we already expect to
    # read them — both noise, and reads are high-volume. Host-side reads by an
    # unexpected binary are the signal. The write rules (2-4) are deliberately NOT
    # namespace-scoped: container writes to these paths are rare and meaningful
    # (see Rule 2).
    # -------------------------------------------------------------------------
    - call: "security_file_open"
      syscall: false
      return: true
      message: "Sensitive file opened"
      args:
        - index: 0
          type: "file"
      returnArg:
        index: 0
        type: "int"
      selectors:
        # Directory opens under /etc/kubernetes/ are not sensitive reads —
        # opening a directory only allows listing its entries, not reading
        # file contents. Suppress to avoid noise from cert renewal scripts,
        # container runtime (runc).
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "/etc/kubernetes/ssl"
                - "/etc/kubernetes/pki"
                - "/etc/kubernetes/pki/etcd"
                - "/etc/kubernetes/config"
                - "/etc/kubernetes/config/kubeletenv"
          matchActions:
            - action: "NoPost"

        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/etc/kubernetes/"
                - "/etc/pam.conf"
                - "/etc/pam.d/"
                - "/etc/security/pwquality.conf"
                - "/etc/shadow"
                - "/etc/sudoers"
                - "/etc/sudoers.d/"
                - "/etc/ssh/" # reading host private keys = host impersonation
                - "/root/.ssh/"
          matchNamespaces:
            - namespace: Mnt
              operator: In
              values:
                - "host_ns"
          matchBinaries:
            - operator: "NotIn"
              values:
                - /opt/bin/kubelet
                - /sbin/unix_chkpwd
                - /usr/sbin/unix_chkpwd # usr-merged path (exec map may record either)
                - /usr/bin/sudo # sudo reads sudoers/pam; execs already logged
                - /usr/bin/systemd-tmpfiles
                - /usr/lib/systemd/systemd
                - /usr/lib/systemd/systemd-executor
                - /usr/lib/systemd/systemd-userwork
                - /usr/lib64/misc/sshd-session
                - /usr/lib64/misc/sshd-auth
                - /usr/sbin/sshd # listener reads /etc/ssh host keys at startup
                - /usr/local/bin/kube-apiserver
                - /usr/local/bin/kube-controller-manager
                - /usr/local/bin/kube-scheduler
                - /usr/bin/truncate # cert renewal clears kubeletenv via open+ftruncate
                - /usr/bin/dpkg # package install — reads shadow/pam during configuration
                - /usr/sbin/dpkg-preconfigure # package install — reads shadow/pam during configuration
                - /usr/share/debconf/frontend # debconf reads /etc/shadow to check system users during dpkg postinst scripts

                # Suppress all /opt/bin/cfssl* binaries (cert renewal service):
                # cfssl-new-* are shell scripts; the BPF matchBinaries
                # filter resolves to the interpreter (/bin/bash), not the script path,
                # so the Prefix above misses them. They all open the ssl directory
                # itself which is filtered in next step.
                - /opt/bin/cfssl
                - /opt/bin/cfssljson
          matchReturnArgs:
            - index: 0
              operator: "Equal"
              values:
                - "0"
          matchActions:
            - action: Post
              rateLimit: "1s"
              rateLimitScope: "process"

        # Direct physical/kernel memory read = credential harvesting from RAM,
        # bypassing all file ACLs. Nothing legitimate reads these on a node.
        # Deliberately NOT namespace-scoped: a container reading them (needs
        # privileged + host /dev/proc) is equally suspicious.
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                - "/dev/mem"
                - "/dev/kmem"
                - "/proc/kcore"
          matchReturnArgs:
            - index: 0
              operator: "Equal"
              values:
                - "0"
          matchActions:
            - action: Post
              rateLimit: "1s"
              rateLimitScope: "process"

        # Separate selector: cgroup release_agent escape detection.
        # Must be its own selector — Postfix+Prefix on the same index are AND'd,
        # so combining them would require both conditions to be true simultaneously.
        # Real paths: /sys/fs/cgroup/<subsystem>/release_agent — never under /etc.
        - matchArgs:
            - index: 0
              operator: "Postfix"
              values:
                - "/release_agent"
          matchReturnArgs:
            - index: 0
              operator: "Equal"
              values:
                - "0"
          matchActions:
            - action: Post
              rateLimit: "1s"
              rateLimitScope: "process"

    # -------------------------------------------------------------------------
    # Rule 2: Write to sensitive system paths
    #
    # security_file_permission fires on each read()/write() call — it is the
    # only LSM hook that catches actual write I/O after open. Rule 1 catches
    # opens; this catches the actual data being written.
    #
    # Filtered to MAY_WRITE (2) only — MAY_READ (4) is excluded to avoid
    # the per-read() noise that makes this hook impractical for read monitoring.
    #
    # Scoped to targeted sensitive paths rather than all of /etc to avoid noise
    # from legitimate services writing under /etc (Prometheus text file collectors,
    # dynamic resolv.conf updates, etc.). The binary path prefixes (/bin, /usr/bin,
    # etc.) remain broad since any write there is suspicious regardless of filename.
    #
    # Unlike Rule 1 (host-only), this runs in ALL mount namespaces. Reads inside
    # containers are high-volume noise, but writes to these paths at runtime are
    # rare and meaningful: a compromised container dropping a binary into /usr/bin,
    # backdooring a library, or rewriting its own /etc/passwd is exactly the
    # tamper/persistence signal we want to keep. (Image builds happen off-node at
    # CI time, so runtime writes here are uncommon.)
    #
    # NOTE: On Flatcar the host /usr is a read-only (dm-verity) filesystem, so a
    # write to /usr/bin, /lib, etc. fails at open() — before this hook runs — and
    # produces no event. On the host these binary-path prefixes therefore only fire
    # after /usr has been remounted read-write (itself a strong tamper signal);
    # inside containers (writable layers) they fire on the tool-drop / persistence
    # writes described above.
    # -------------------------------------------------------------------------
    - call: "security_file_permission"
      syscall: false
      return: true
      message: "Write to sensitive system path"
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "int" # permission mask: MAY_READ=4, MAY_WRITE=2, MAY_EXEC=1
      returnArg:
        index: 0
        type: "int"
      selectors:
        # exceptions
        - matchArgs:
            - index: 0
              operator: "Equal"
              values:
                # accessed during morning cert rotation contains non sensitive info
                - "/etc/kubernetes/config/kubeletenv"
          matchActions:
            - action: "NoPost"

        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                &security_file_permission_write_values # Credential and auth files
                - "/etc/passwd"
                - "/etc/shadow"
                - "/etc/group"
                - "/etc/gshadow"
                # Privilege escalation
                - "/etc/sudoers"
                - "/etc/sudoers.d/"
                # PAM and auth config
                - "/etc/pam.conf"
                - "/etc/pam.d/"
                - "/etc/security/"
                # SSH config tampering
                - "/etc/ssh/"
                # Kubernetes config
                - "/etc/kubernetes/"
                # Persistence vectors
                - "/etc/cron"
                - "/etc/profile"
                - "/etc/profile.d/"
                - "/etc/bashrc"
                - "/etc/environment"
                # systemd units — primary persistence mechanism on Flatcar
                # (writing a unit body; `systemctl enable` symlinks go through
                # security_inode_symlink, not this MAY_WRITE hook, so no noise)
                - "/etc/systemd/system/"
                # Dynamic linker config — library hijacking
                - "/etc/ld.so"
                # Binary paths — supply chain / tamper
                - "/bin"
                - "/usr/bin"
                - "/usr/local/bin"
                - "/usr/sbin"
                - "/usr/local/sbin"
                - "/lib"
                - "/lib64"
                - "/usr/lib"
                # SSH authorized_keys — persistence (root + core login user)
                - "/root/.ssh"
                - "/home/core/.ssh"
            - index: 1
              operator: "Equal"
              values:
                - "2" # MAY_WRITE only
          matchBinaries:
            - operator: "NotIn"
              values:
                - /sbin/apk # Exec allowlist already catches apk installs
                - /usr/bin/dpkg # Exec allowlist already catches dpkg installs
                - /opt/bin/ssh-key-agent # manages core user's authorized_keys

                # Suppress all /opt/bin/cfssl* binaries (cert renewal service):
                # cfssl-new-* are shell scripts; the BPF matchBinaries
                - /opt/bin/cfssl
                - /opt/bin/cfssljson
          matchReturnArgs:
            - index: 0
              operator: "Equal"
              values:
                - "0"
          matchActions:
            - action: Post
              rateLimit: "1s"
              rateLimitScope: "process"

        # cgroup release_agent write detection (T1611 container escape).
        # Matches the Falco rule "Detect release_agent File Container Escapes"
        # which fires on open_write to any path ending in release_agent.
        # Real paths: /sys/fs/cgroup/<subsystem>/<cgroup>/release_agent
        - matchArgs:
            - index: 0
              operator: "Postfix"
              values:
                - "/release_agent"
            - index: 1
              operator: "Equal"
              values:
                - "2" # MAY_WRITE only
          matchReturnArgs:
            - index: 0
              operator: "Equal"
              values:
                - "0"
          matchActions:
            - action: Post
              rateLimit: "1s"
              rateLimitScope: "process"
    # -------------------------------------------------------------------------
    # Rule 3: Sensitive system path mapped for write via mmap
    #
    # mmap() with MAP_SHARED+PROT_WRITE allows writing to a file without ever
    # calling write() — the write() syscall path (and thus security_file_permission)
    # is bypassed entirely. This is the only hook that catches write-via-mmap.
    #
    # Filtered to MAP_SHARED (0x01) + PROT_WRITE (0x02) to avoid noise:
    #   - MAP_PRIVATE copy-on-write mappings never modify the underlying file
    #   - PROT_READ-only mappings are reads, not writes
    #
    # Same targeted path scope as Rule 2.
    # -------------------------------------------------------------------------
    - call: "security_mmap_file"
      syscall: false
      return: true
      message: "Sensitive system path mapped for write (MAP_SHARED)"
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "ulong" # prot flags: PROT_EXEC=0x04, PROT_WRITE=0x02, PROT_READ=0x01
        - index: 2
          type: "ulong" # mmap flags: MAP_SHARED=0x01, MAP_PRIVATE=0x02
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values: *security_file_permission_write_values
            - index: 1
              operator: "Mask"
              values:
                - "2" # PROT_WRITE
            - index: 2
              operator: "Mask"
              values:
                - "1" # MAP_SHARED
          matchReturnArgs:
            - index: 0
              operator: "Equal"
              values:
                - "0"
          matchBinaries:
            - operator: "NotIn"
              values:
                - /sbin/apk # Exec allowlist already catches apk installs
          matchActions:
            - action: Post
              rateLimit: "1s"
              rateLimitScope: "process"

    # -------------------------------------------------------------------------
    # Rule 4: Truncate sensitive file via path
    #
    # truncate() bypasses security_file_open entirely — it takes a path and
    # truncates the file without a traditional open(). Truncating /etc/shadow
    # or /etc/sudoers destroys the file contents and breaks authentication.
    # Uses kernel-resolved struct path * — no TOCTOU.
    #
    # ftruncate() (fd-based) is not hooked here: the prerequisite open() is
    # already caught by Rule 1.
    # -------------------------------------------------------------------------
    - call: "security_path_truncate"
      syscall: false
      return: true
      message: "Sensitive file truncated via path"
      args:
        - index: 0
          type: "path"
      returnArg:
        index: 0
        type: "int"
      selectors:
        - matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/etc" # Truncate to sensitive directories
                - "/root/.ssh"
                - "/var/log" # Truncate to logs
          matchReturnArgs:
            - index: 0
              operator: "Equal"
              values:
                - "0"
          matchActions:
            - action: Post
              rateLimit: "1s"
              rateLimitScope: "process"
