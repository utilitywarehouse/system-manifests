crds:
  installMethod: "helm"

# "stdout". "" to disable.
export:
  mode: ""
# hooks are required to map the new container ID to its namespace/labels,
# and push that info down into its eBPF maps *synchronously*.
# since our policies are audit only API Server's asynchronous calls are fine
# rthooks:
#   # -- Enable the Tetragon rthooks daemonset
#   enabled: true
#   interface: nri-hook
#   failAllowNamespacesRegex: [".*"]

tetragon:
  processAncestors:
    enabled: "base,kprobe,tracepoint,lsm"
    # -- JSON export file permissions as a string. Typically it's either "600" (to restrict access to
    # owner) or "640"/"644" (to allow read access by logs collector or another agent).
    # vector runs as root
  exportFilePerm: "600"
  extraArgs:
    # Default is 32768 (~30MB RAM, pre-allocated).
    # When the map is full and process entry is not inserted and its lookup returns NULL and the exclusion silently doesn't work
    # Thousands of events are serialised, ring-buffered, and sent to userspace
    # even though they're ultimately dropped due to export-denylist filter.
    # 262144 =~ 240MB
    execve-map-entries: "262144"
