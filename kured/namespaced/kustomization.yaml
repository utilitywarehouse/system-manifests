apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - daemonset.yaml
  - role.yaml
  - rolebinding.yaml
  - serviceaccount.yaml
patches:
  - path: canonical-name-label-patch.yaml
  - path: expose-metrics-patch.yaml
  - target:
      kind: DaemonSet
      name: kured
    patch: |
      - op: add
        path: /spec/template/spec/tolerations/-
        value:
          key: node.uw.systems/with-stepsecurity-harden-runner
          effect: NoSchedule
