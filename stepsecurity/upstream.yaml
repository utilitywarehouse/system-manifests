      ignoreDNSRegex: ""
      ignoreDestinationIPRegex: ""
      ignoreFilePathRegex: ""
      ignorePrivateConnections: "false"
      ignoreProcessPathRegex: ""
      ignoreResolvedIPRegex: ""
      k8sModeDisabled: "false"
      logEbpFEvents: "false"
      maxCNPAgeInMinutes: 1440
      prefixesToInclude:
      - /runner/
      - /home/runner/
      - /__w/
      prometheus:
