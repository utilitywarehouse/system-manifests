        podMonitor:
          additionalLabels: {}
          enabled: false
          interval: 30s
        port: 8008
        serviceMonitor:
          additionalLabels: {}
          enabled: false
          interval: 30s
      ringBufferSize: 134217728
      soPrefixes:
