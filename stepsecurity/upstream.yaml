---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  namespace: sys-actions
  name: hardenrunner
  labels:
    app.kubernetes.io/instance: hardenrunner
    app.kubernetes.io/app: hardenrunner
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: hardenrunner
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: hardenrunner
        app.kubernetes.io/app: hardenrunner
    spec:
      hostPID: true
      serviceAccountName: hardenrunner
      nodeSelector:
        node.uw.systems/with-stepsecurity-harden-runner: "true"
      tolerations:
        - effect: NoSchedule
          key: node.uw.systems/with-stepsecurity-harden-runner
      volumes:
        - name: host-sys-fs-cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
        - name: host-run
          hostPath:
            path: /run
            type: Directory
        - name: config-volume
          configMap:
            name: arc-harden-runner-config
            items:
              - key: values
                path: values.yaml
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
        - name: hubble-server-certs
          secret:
            secretName: "hubble-server-certs"
      containers:
        - name: hardenrunner
          securityContext: 
            privileged: true
          image: ghcr.io/step-security/arc-harden-runner/arc-harden-runner@sha256:7fb760b33dcd9a697e40d552b932e8d8594d3926a4e3a8228dc8fd784f5c2bdc
          imagePullPolicy: IfNotPresent
          ports:
            - name: hr-metrics
              containerPort: 8008
              protocol: TCP
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: helmChartVersion
              value: "2.18.4"
            - name: stepSecurityApiEndpoint
              value: "https://agent.api.stepsecurity.io/v1"
            - name: stepSecurityTelemetryEndpoint
              value: "https://prod.app-api.stepsecurity.io/v1"
            - name: dnsMode
              value: "step-security"
            - name: maxCNPAgeInMinutes
              value: "1440"
            - name: cnpCleanupIntervalMinutes
              value: "5,50"
            - name: logEbpFEvents
              value: "false"
            - name: arcPodNameRegexes
              value: ""
            - name: blockModeDisabled
              value: "false"
            - name: enableFileMonitoring
              value: "true"
            - name: k8sModeDisabled
              value: "false"
            - name: ignorePrivateConnections
              value: "false"
            - name: disableHealthReport
              value: "false"
            - name: disablePodErrorLogs
              value: "false"
            - name: disableProcessArgsCollection
              value: "false"
            - name: disableMemReadEvent
              value: "false"
            - name: disableHttpsMonitoring
              value: "false"
            - name: ignoreDNSRegex
              value: ""
            - name: ignoreDestinationIPRegex
              value: ""
            - name: ignoreResolvedIPRegex
              value: ""
            - name: ignoreFilePathRegex
              value: ""
            - name: ignoreProcessPathRegex
              value: ""
            - name: enableFipsMode
              value: "false"
            - name: debugMode
              value: "false"
            - name: clusterName
              value: "[CLUSTER_NAME]"
            - name: customer
              value: "utilitywarehouse"
            - name: hubbleServerCertsSecretName
              value: "hubble-server-certs"
            - name: apiKey
              value: "step_api_key_change_me"
            - name: arcRunnerNameSpaces
              value: "sys-actions"
            - name: ringBufferSize
              value: "134217728"
            - name: enabledTracer
              value: "1"
            - name: enableTetragonSidecar
              value: "0"
            - name: healthReportInterval
              value: "900"
            - name: enableMetrics
              value: "1"
