apiVersion: cilium.io/v1alpha1
kind: TracingPolicyNamespaced
metadata:
  name: "overwritessys-actions"
  namespace: sys-actions
spec:
  options:
    - name: "policy-mode"
      value: "monitor"
  kprobes:
    - call: "do_renameat2"
      syscall: false
      args:
        - index: 1
          type: "filename"
        - index: 3
          type: "filename"

    - call: "do_sys_open"
      return: true
      syscall: false
      args:
        - index: 0
          type: int
        - index: 1
          type: "string"
        - index: 2
          type: "int"
        - index: 3
          type: "int"
      returnArg:
        index: 0
        type: int
      selectors:
      - matchArgs:
        - index: 2
          operator: "Mask"
          values:
          - "64" # CREATE (0x40)
          - "1"  # WRONLY (0x01)
          - "2"  # RDWR (0x02)
        matchReturnArgs:
        - index: 0
          operator: "GT"
          values:
          - "0"
        matchBinaries:
          - operator: NotIn
            values: 
              - /runner/bin/Runner.Listener
              - /runner/bin/Runner.Worker
              - /usr/local/bin/dockerd
              - /usr/local/bin/docker
              - /usr/bin/docker
              - /usr/bin/containerd
              - /usr/local/bin/containerd
      - matchArgs:
        - index: 1
          operator: "Postfix"
          values:
          - "mem"
        matchBinaries:
          - operator: NotIn
            values: 
              - /runner/bin/Runner.Listener
              - /runner/bin/Runner.Worker
              - /usr/local/bin/dockerd
              - /usr/local/bin/docker
              - /usr/bin/docker
              - /usr/bin/containerd
              - /usr/local/bin/containerd
    
    - call: "do_sys_openat2"
      return: true
      syscall: false
      args:
      - index: 0
        type: "int"
      - index: 1
        type: "string"
      - index: 2
        type: "uint64"
        resolve: "flags" # how.flags
      returnArg:
        index: 0
        type: int
      selectors:
      - matchArgs:
        - index: 2
          operator: "Mask"
          values:
          - "64" # CREATE (0x40)
          - "1"  # WRONLY (0x01)
          - "2"  # RDWR (0x02)
        matchReturnArgs:
        - index: 0
          operator: "GT"
          values:
          - "0"
        matchBinaries:
          - operator: NotIn
            values: 
                  - /runner/bin/Runner.Listener
                  - /runner/bin/Runner.Worker
                  - /usr/local/bin/dockerd
                  - /usr/local/bin/docker
                  - /usr/bin/docker
                  - /usr/bin/containerd
                  - /usr/local/bin/containerd
      - matchArgs:
        - index: 1
          operator: "Postfix"
          values:
          - "mem"
        matchBinaries:
          - operator: NotIn
            values: 
                  - /runner/bin/Runner.Listener
                  - /runner/bin/Runner.Worker
                  - /usr/local/bin/dockerd
                  - /usr/local/bin/docker
                  - /usr/bin/docker
                  - /usr/bin/containerd
                  - /usr/local/bin/containerd
    - call: "security_mmap_file"
      syscall: false
      args:
      - index: 0
        type: "file"
      - index: 1
        type: "uint32"
      - index: 2
        type: "nop"
      selectors:
      - matchArgs:
        - index: 0
          operator: "Prefix"
          values: 
              - /runner/
              - /home/runner/
              - /__w/
        - index: 1
          operator: "Mask"
          values:
          - "2"
        matchBinaries:
          - operator: NotIn
            values: 
              - /runner/bin/Runner.Listener
              - /runner/bin/Runner.Worker
              - /usr/local/bin/dockerd
              - /usr/local/bin/docker
              - /usr/bin/docker
              - /usr/bin/containerd
              - /usr/local/bin/containerd
    - call: "security_path_truncate"
      syscall: false
      args:
      - index: 0
        type: "path"
