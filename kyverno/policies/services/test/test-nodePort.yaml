apiVersion: v1
kind: Service
metadata:
  name: test-nodeport-not-set
spec:
  type: ClusterIP
  ports:
    - name: dummy
      port: 12345
      protocol: TCP
      targetPort: 12345
---
apiVersion: v1
kind: Service
metadata:
  name: test-nodeport-not-allowed
spec:
  type: NodePort
  ports:
    - name: dummy
      nodePort: 30001
      port: 30001
      protocol: TCP
      targetPort: 30001
---
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: homer-heplify-server-restrict-nodeport
  namespace: kube-system
spec:
  exceptions:
    - policyName: restrict-nodeport
      ruleNames: ["*"]
  match:
    any:
      - resources:
          kinds:
            - Service
          namespaces:
            - default
          names:
            - test-nodeport-exception-allowed
  conditions:
    all:
      - key: "{{ request.object.spec.ports[?nodePort].nodePort }}"
        operator: AllIn
        value:
          - 30960
---
apiVersion: v1
kind: Service
metadata:
  name: test-nodeport-exception-allowed
  namespace: default
spec:
  type: NodePort
  ports:
    - name: udp
      nodePort: 30960
      port: 9060
      protocol: UDP
      targetPort: 9060
