apiVersion: policies.kyverno.io/v1alpha1
kind: PolicyException
metadata:
  name: allow-letsencrypt-team-c
  namespace: kube-system
spec:
  policyRefs:
    - name: restrict-letsencrypt-cluster-issuer
      kind: ValidatingPolicy
  matchConditions:
    - name: approved-domains-for-team-c
      expression: >-
        object.metadata.namespace == 'team-c' &&
        has(object.spec.dnsNames) &&
        object.spec.dnsNames.all(domain, domain in [
          '*.one.team-c.uw.systems',
          '*.api.uw.systems'
        ])
