apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: vault-aws-role-arn
  annotations:
    policies.kyverno.io/title: Validate Vault AWS role arn
    policies.kyverno.io/category: Operations
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Vault
    policies.kyverno.io/description: >-
      Verify that `vault.uw.systems/aws-role` annotation contains a valid role
      arn
spec:
  validationActions:
    - Deny
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["serviceaccounts"]
  validations:
    - expression: >-
        has(object.metadata.annotations) && 'vault.uw.systems/aws-role' in object.metadata.annotations ? 
        object.metadata.annotations['vault.uw.systems/aws-role'].matches('^arn:aws:iam::[0-9]+:role/[a-zA-Z0-9_+=,.@-]+') : true
      message: "The annotation `vault.uw.systems/aws-role` must contain a valid role arn"
