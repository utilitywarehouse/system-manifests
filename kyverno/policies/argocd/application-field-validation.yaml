# https://main.kyverno.io/policies/argo/application-field-validation/application-field-validation/
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: argocd-application-field-validation
  annotations:
    policies.kyverno.io/title: Application Field Validation
    policies.kyverno.io/category: Argo
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Application
    policies.kyverno.io/description: >-
      Validates ArgoCD Application fields: prevents empty projects/namespaces,
      ensures source paths are used instead of Helm charts, and enforces 
      destination fields.
spec:
  validationActions:
    - Deny
  matchConstraints:
    resourceRules:
      - apiGroups: ["argoproj.io"]
        apiVersions: ["*"]
        operations: ["CREATE", "UPDATE"]
        resources: ["applications"]
  validations:
    - expression: "has(object.spec.project) && object.spec.project != ''"
      message: "`spec.project` should not be empty."

    - expression: "object.spec.project != 'default'"
      message: "The `default` is a privileged project and it may not be used in an Application."

    - expression: "has(object.spec.source) != has(object.spec.sources)"
      message: "An Application must define exactly one: either `spec.source` OR `spec.sources`."

    - expression: "has(object.spec.source) ? has(object.spec.source.path) : true"
      message: "When using `spec.source`, a `path` must be defined."

    - expression: "has(object.spec.sources) ? object.spec.sources.all(s, has(s.path)) : true"
      message: "Every entry in `spec.sources` must specify a `path`."

    - expression: "has(object.spec.source) ? !has(object.spec.source.chart) : true"
      message: "Helm charts are not permitted in `spec.source`. Please use a git path."

    - expression: "has(object.spec.sources) ? object.spec.sources.all(s, !has(s.chart)) : true"
      message: "Helm charts are not permitted in `spec.sources`. All entries must use git paths."

    - expression: "has(object.spec.destination.namespace) && object.spec.destination.namespace != ''"
      message: "`spec.destination.namespace` should not be empty."
