apiVersion: cli.kyverno.io/v1alpha1
kind: Test
metadata:
  name: test-argocd-policies
policies:
  - ../application-field-validation.yaml
  - ../application-prevent-default-project.yaml
resources:
  - test-application-prevent-default-project.yaml
  - test-application-field-validation.yaml
results:
  # Test default-project
  - policy: argocd-application-prevent-default-project
    rule: default-project
    kind: Application
    resources: ["test-custom-project"]
    result: pass

  - policy: argocd-application-prevent-default-project
    rule: default-project
    kind: Application
    resources: ["test-default-project", "test-missing-project-name"]
    result: fail

  # Test Application Fields validation
  - policy: argocd-application-field-validation
    rule: empty-project
    kind: Application
    resources: ["test-missing-project-name"]
    result: fail

  - policy: argocd-application-field-validation
    rule: empty-source-path
    kind: Application
    resources:
      ["test-missing-source-path", "test-source-and-sources-both-specified"]
    result: fail
  - policy: argocd-application-field-validation
    rule: empty-source-path
    kind: Application
    resources:
      ["test-source-path-specified", "test-multiple-source-path-specified"]
    result: pass

  - policy: argocd-application-field-validation
    rule: chart-should-not-be-used
    kind: Application
    resources:
      ["test-source-path-specified", "test-multiple-source-path-specified"]
    result: pass
  - policy: argocd-application-field-validation
    rule: chart-should-not-be-used
    kind: Application
    resources:
      ["test-source-path-chart-specified", "test-sources-chart-specified"]
    result: fail

  - policy: argocd-application-field-validation
    rule: empty-destination-namespace
    kind: Application
    resources: ["test-missing-destination-namespace"]
    result: fail
