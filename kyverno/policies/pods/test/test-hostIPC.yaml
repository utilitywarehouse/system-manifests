apiVersion: v1
kind: Pod
metadata:
  name: test-hostipc-not-set
  labels:
    app: test-hostIPC-not-set
spec:
  containers:
    - name: test
      image: alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: test-hostipc-set-to-false
  labels:
    app: test-hostIPC-set-to-false
spec:
  hostIPC: false
  containers:
    - name: test
      image: alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: test-hostipc-set-to-true
  labels:
    app: test-hostIPC-set-to-true
spec:
  hostIPC: true
  containers:
    - name: test
      image: alpine
---
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: trident-disallow-host-ipc-pods
  namespace: kube-system
spec:
  policyRefs:
    - name: disallow-host-ipc-pods
      kind: ValidatingPolicy
  matchConditions:
    - name: for-given-namespace
      expression: "object.metadata.?namespace.orValue('') == 'default'"

    - name: for-given-app
      expression: "object.metadata.name.startsWith('test-hostipc-set-to-true-exception')"
---
apiVersion: v1
kind: Pod
metadata:
  name: test-hostipc-set-to-true-exception-allowed
  namespace: default
spec:
  hostIPC: true
  containers:
    - name: test
      image: alpine
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-hostipc-set-to-true-exception-deployment-allow
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-hostipc-set-to-true-exception-deployment-allow
  template:
    metadata:
      labels:
        app: test-hostipc-set-to-true-exception-deployment-allow
    spec:
      hostIPC: true
      containers:
        - name: test
          image: alpine
