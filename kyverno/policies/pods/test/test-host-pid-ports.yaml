# hostPID tests
apiVersion: v1
kind: Pod
metadata:
  name: test-hostpid-false
spec:
  hostPID: false
  containers:
    - name: test
      image: alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: test-hostpid-true
spec:
  hostPID: true
  containers:
    - name: test
      image: alpine
---
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: kured-disallow-host-pid-pods
  namespace: kube-system
spec:
  exceptions:
    - policyName: disallow-host-pid-pods
      ruleNames: ["*"]
  match:
    any:
      - resources:
          namespaces:
            - default
          names:
            - test-hostpid-true-exceptions*
---
apiVersion: v1
kind: Pod
metadata:
  name: test-hostpid-true-exceptions-allow
  namespace: default
spec:
  hostPID: true
  containers:
    - name: test
      image: alpine
---
# hostPorts tests
apiVersion: v1
kind: Pod
metadata:
  name: test-hostport-zero
spec:
  containers:
    - name: test
      image: alpine
      ports:
        - containerPort: 80
          hostPort: 0
---
apiVersion: v1
kind: Pod
metadata:
  name: test-hostport-forbidden
spec:
  containers:
    - name: test
      image: alpine
      ports:
        - containerPort: 80
          hostPort: 8080
---
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: csi-gce-pd-disallow-host-ports
  namespace: kube-system
spec:
  exceptions:
    - policyName: disallow-host-ports
      ruleNames: ["*"]
  match:
    any:
      - resources:
          namespaces:
            - kube-system
          names:
            - test-hostport-exception*
  conditions:
    all:
      - key: >-
          {{
            [
              request.object.spec.containers[].ports[?hostPort].hostPort,
              request.object.spec.template.spec.containers[].ports[?hostPort].hostPort
            ] | [][] || `[]`
          }}
        operator: AllIn
        value:
          - 22011
          - 22012
          - 22013
---
apiVersion: v1
kind: Pod
metadata:
  name: test-hostport-exception-allow
  namespace: kube-system
spec:
  containers:
    - image: alpine
      name: gce-pd-driver
      ports:
        - containerPort: 22011
          hostPort: 22011
          name: http-endpoint
          protocol: TCP
    - image: alpine
      name: csi-attacher
      ports:
        - containerPort: 22012
          hostPort: 22012
          name: http-endpoint
          protocol: TCP
    - image: alpine
      name: csi-resizer
      ports:
        - containerPort: 22013
          hostPort: 22013
          name: http-endpoint
          protocol: TCP
