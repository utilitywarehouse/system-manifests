apiVersion: v1
kind: Pod
metadata:
  name: test-capabilities-none
spec:
  containers:
    - name: test
      image: alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: test-capabilities-allowed
spec:
  containers:
    - name: test
      image: alpine
      securityContext:
        capabilities:
          add:
            - NET_BIND_SERVICE
---
apiVersion: v1
kind: Pod
metadata:
  name: test-capabilities-forbidden
spec:
  containers:
    - name: test
      image: alpine
      securityContext:
        capabilities:
          add:
            - SYS_TIME
