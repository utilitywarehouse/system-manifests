apiVersion: v1
kind: Pod
metadata:
  name: test-capabilities-none
spec:
  containers:
    - name: test
      image: alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: test-capabilities-allowed
spec:
  containers:
    - name: test
      image: alpine
      securityContext:
        capabilities:
          add:
            - NET_BIND_SERVICE
---
apiVersion: v1
kind: Pod
metadata:
  name: test-capabilities-forbidden
spec:
  containers:
    - name: test
      image: alpine
      securityContext:
        capabilities:
          add:
            - SYS_PTRACE
            - NET_BIND_SERVICE
---
apiVersion: policies.kyverno.io/v1
kind: PolicyException
metadata:
  name: shared-sys-ptrace-pod-capabilities
  namespace: kube-system
spec:
  policyRefs:
    - name: pod-capabilities
      kind: ValidatingPolicy
  matchConditions:
    - name: for-given-namespace
      expression: "object.metadata.?namespace.orValue('') == 'default'"

    - name: extend-pod-capabilities
      expression: >-
        object.spec.?containers.orValue([]).all(c, 
          c.?securityContext.?capabilities.?add.orValue([]).all(cap, cap in ['SYS_PTRACE', 'NET_BIND_SERVICE', ''])
        )
---
apiVersion: v1
kind: Pod
metadata:
  name: test-capabilities-exception-allowed
  namespace: default
spec:
  containers:
    - name: test
      image: alpine
      securityContext:
        capabilities:
          add:
            - SYS_PTRACE
            - NET_BIND_SERVICE
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-capabilities-exception-deployment-allowed
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-capabilities-exception-deployment-allowed
  template:
    metadata:
      labels:
        app: test-capabilities-exception-deployment-allowed
    spec:
      containers:
        - name: test
          image: alpine
          securityContext:
            capabilities:
              add:
                - SYS_PTRACE
                - NET_BIND_SERVICE
