apiVersion: v1
kind: Pod
metadata:
  name: test-scheduling-none
spec:
  containers:
    - name: test
      image: alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: test-scheduling-safe-toleration
spec:
  tolerations:
    - key: "example.com/safe-key"
      operator: "Exists"
      effect: "NoSchedule"
  containers:
    - name: test
      image: alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: test-scheduling-master-forbidden
spec:
  tolerations:
    - key: "node-role.kubernetes.io/master"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
  containers:
    - name: test
      image: alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: test-scheduling-control-plane-forbidden
spec:
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
  containers:
    - name: test
      image: alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: test-scheduling-excluded-namespace
  namespace: kube-system
spec:
  tolerations:
    - key: "node-role.kubernetes.io/master"
      operator: "Exists"
  containers:
    - name: test
      image: alpine
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    name: sys-mon
    uw.systems/owner: system
  name: sys-mon
---
apiVersion: v1
kind: Pod
metadata:
  name: test-scheduling-excluded-namespace
  namespace: sys-mon
spec:
  tolerations:
    - key: "node-role.kubernetes.io/master"
      operator: "Exists"
  containers:
    - name: test
      image: alpine
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    app.kubernetes.io/name: test-scheduling-excluded-namespace-ds
  name: test-scheduling-excluded-namespace-ds
  namespace: sys-mon
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: test-scheduling-excluded-namespace-ds
  template:
    metadata:
      labels:
        app.kubernetes.io/name: test-scheduling-excluded-namespace-ds
    spec:
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/master
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
      containers:
        - name: test
          image: alpine
