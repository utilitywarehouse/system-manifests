apiVersion: v1
kind: Pod
metadata:
  name: test-host-network-not-set
  labels:
    app: test-host-network-not-set
spec:
  containers:
    - name: test
      image: alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: test-host-network-set-to-false
  labels:
    app: test-host-network-set-to-false
spec:
  hostNetwork: false
  containers:
    - name: test
      image: alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: test-host-network-set-to-true
  labels:
    app: test-host-network-set-to-true
spec:
  hostNetwork: true
  containers:
    - name: test
      image: alpine
---
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: etcd-backup-disallow-host-network-pods
  namespace: kube-system
spec:
  exceptions:
    - policyName: disallow-host-network-pods
      ruleNames: ["*"]
  match:
    any:
      - resources:
          namespaces:
            - default
          names:
            - test-host-network-set-to-true-exception*
---
apiVersion: v1
kind: Pod
metadata:
  name: test-host-network-set-to-true-exception-allowed
  namespace: default
spec:
  hostNetwork: true
  containers:
    - name: test
      image: alpine
