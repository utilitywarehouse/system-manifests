apiVersion: v1
kind: Pod
metadata:
  name: test-hostpath-none
spec:
  containers:
    - name: test
      image: alpine
---
apiVersion: v1
kind: Pod
metadata:
  name: test-hostpath-emptydir
spec:
  containers:
    - name: test
      image: alpine
  volumes:
    - name: cache-volume
      emptyDir: {}
---
apiVersion: v1
kind: Pod
metadata:
  name: test-hostpath-forbidden
spec:
  containers:
    - name: test
      image: alpine
  volumes:
    - name: task-pv-storage
      hostPath:
        path: /data
        type: Directory
---
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: calico-node-hostpath-vols
  namespace: kube-system
spec:
  exceptions:
    - policyName: hostpath-vols
      ruleNames: ["*"]
  match:
    any:
      - resources:
          namespaces:
            - kube-system
          names:
            - test-hostpath-exception*
  conditions:
    all:
      - key: >-
          {{
            [
              request.object.spec.volumes[?hostPath].hostPath.path,
              request.object.spec.template.spec.volumes[?hostPath].hostPath.path
            ] | [] || `[]`
          }}
        operator: AllIn
        value:
          - /usr/share/ca-certificates
          - /lib/modules
          - /var/run/calico
---
apiVersion: v1
kind: Pod
metadata:
  name: test-hostpath-exception-allowed
  namespace: kube-system
spec:
  containers:
    - name: test
      image: alpine
  volumes:
    - hostPath:
        path: /usr/share/ca-certificates
        type: ""
      name: ssl-certs
    - hostPath:
        path: /lib/modules
        type: ""
      name: lib-modules
    - hostPath:
        path: /var/run/calico
        type: DirectoryOrCreate
      name: var-run-calico
