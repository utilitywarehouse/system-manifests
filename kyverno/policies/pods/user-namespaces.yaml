apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: enforce-user-namespaces
spec:
  autogen:
    mutatingAdmissionPolicy:
      enabled: false
    podControllers:
      controllers: []

  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]

  matchConditions:
    # https://kubernetes.io/docs/concepts/workloads/pods/user-namespaces/#limitations
    - name: exclude-host-namespaces
      expression: >-
        !(
          object.spec.?hostNetwork.orValue(false) ||
          object.spec.?hostPID.orValue(false) ||
          object.spec.?hostIPC.orValue(false)
        )
    # failed to fulfil mount request: failed to set MOUNT_ATTR_IDMAP on /dev: invalid
    # argument (maybe the filesystem used doesn't support idmap mounts on this kernel?
    - name: exclude-hostpath-volumes
      expression: >-
        object.spec.?volumes.orValue([]).all(v,
          !has(v.hostPath)
        )

  mutations:
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: >-
          Object{
            spec: Object.spec{
              hostUsers: false
            }
          }
