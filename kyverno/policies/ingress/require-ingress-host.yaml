apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: require-ingress-host
  annotations:
    policies.kyverno.io/title: Require Ingress Host
    policies.kyverno.io/category: Traefik
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Ingress
    policies.kyverno.io/description: >-
      prevent ingresses from hijacking the default traefik route by requiring an
      explicit host value
spec:
  validationActions:
    - Deny
  matchConstraints:
    resourceRules:
      - apiGroups:
          - networking.k8s.io
        apiVersions:
          - "*"
        operations:
          - CREATE
          - UPDATE
        resources:
          - ingresses
  validations:
    - expression: >-
        has(object.spec) &&
        has(object.spec.rules) &&
        size(object.spec.rules) > 0 &&
        object.spec.rules.all(rule, has(rule.host) && rule.host != null && rule.host != "")
      message: "Ingresses must specify a host"
