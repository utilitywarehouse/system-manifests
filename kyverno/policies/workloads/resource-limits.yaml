apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: restrict-workload-resource-limits
  annotations:
    policies.kyverno.io/title: Restrict Workload Resource Limits
    policies.kyverno.io/category: Resource Management
    policies.kyverno.io/subject: Workload Controllers
    policies.kyverno.io/description: >-
      This policy restricts all workload controllers from defining Pod templates
      with containers that set CPU limits above 6 cores or memory limits above 24Gi.
spec:
  validationActions:
    - Deny
  matchConstraints:
    resourceRules:
      # Make sure resource limits policy only applies to:
      # Deployments, StatefulSets, DaemonSets, ReplicaSets, Jobs and CronJobs
      # and no longer apply to Pods ensuring that existing resources continue
      # running without disruption while enforcing limits only on new or
      # updated workload controllers.
      - apiGroups:
          - "apps"
        apiVersions:
          - "v1"
        operations:
          - "CREATE"
          - "UPDATE"
        resources:
          - "deployments"
          - "statefulsets"
          - "daemonsets"
          - "replicasets"
      - apiGroups:
          - "batch"
        apiVersions:
          - "v1"
        operations:
          - "CREATE"
          - "UPDATE"
        resources:
          - "jobs"
          - "cronjobs"
  matchConditions:
    # For UPDATE operations, only validate when the pod template spec has actually
    # changed. This prevents system-initiated updates (e.g. status reconciliation,
    # Job pod completions) from blocking existing workloads that were created before
    # this policy was enforced.
    - name: pod-template-changed
      expression: >-
        request.operation == "CREATE" ||
        (has(object.spec.template) && has(oldObject.spec.template) && object.spec.template != oldObject.spec.template) ||
        (has(object.spec.jobTemplate) && has(oldObject.spec.jobTemplate) && object.spec.jobTemplate != oldObject.spec.jobTemplate) ||
        (!has(object.spec.template) && !has(object.spec.jobTemplate))
  variables:
    # Safely abstract the path differences between standard workloads and CronJobs
    - name: containers
      expression: >-
        has(object.spec.template) && has(object.spec.template.spec.containers) ? object.spec.template.spec.containers :
        (has(object.spec.jobTemplate) && has(object.spec.jobTemplate.spec.template.spec.containers) ? object.spec.jobTemplate.spec.template.spec.containers : [])
    - name: initContainers
      expression: >-
        has(object.spec.template) && has(object.spec.template.spec.initContainers) ? object.spec.template.spec.initContainers :
        (has(object.spec.jobTemplate) && has(object.spec.jobTemplate.spec.template.spec.initContainers) ? object.spec.jobTemplate.spec.template.spec.initContainers : [])
  validations:
    # CPU Validations
    # !x.isGreaterThan(y) means x <= y
    - expression: >-
        variables.containers.all(c, !quantity(c.?resources.?limits.?cpu.orValue('0')).isGreaterThan(quantity('6')))
      message: "CPU limit cannot exceed 6 cores in any container within the Pod template."
    - expression: >-
        variables.initContainers.all(c, !quantity(c.?resources.?limits.?cpu.orValue('0')).isGreaterThan(quantity('6')))
      message: "CPU limit cannot exceed 6 cores in any init container within the Pod template."

    # Memory Validations
    - expression: >-
        variables.containers.all(c, !quantity(c.?resources.?limits.?memory.orValue('0')).isGreaterThan(quantity('24Gi')))
      message: "Memory limit cannot exceed 24Gi in any container within the Pod template."
    - expression: >-
        variables.initContainers.all(c, !quantity(c.?resources.?limits.?memory.orValue('0')).isGreaterThan(quantity('24Gi')))
      message: "Memory limit cannot exceed 24Gi in any init container within the Pod template."
