sources:
  kubernetes_events:
    type: kubernetes_logs
    extra_namespace_label_selector: "name=sys-falco"
    use_apiserver_cache: true
  kubernetes_apiserver:
    type: file
    include:
      - /var/log/kube-api-server/audit
  kubernetes_tetragon_events:
    type: "file"
    include: ["/var/run/cilium/tetragon/tetragon.log"]

transforms:
  kubernetes_events_remap:
    inputs:
      - kubernetes_events
    type: remap
    source: |
      .log_source = "kube_audits_events"
  kubernetes_apiserver_remap:
    inputs:
      - kubernetes_apiserver
    type: remap
    source: |
      .log_source = "kube_audits_apiserver"
  kubernetes_tetragon_events_remap:
    inputs:
      - kubernetes_tetragon_events
    type: remap
    source: |
      .log_source = "kube_tetragon_events"

sinks:
  loki_audits:
    inputs:
      - kubernetes_events_remap
      - kubernetes_apiserver_remap
      - kubernetes_tetragon_events_remap
    type: loki
    endpoint: http://loki.sys-audit.svc.cluster.aws:3100
    encoding:
      codec: text
    labels:
      cloud_provider: "${CLOUD_PROVIDER}"
      uw_environment: "${UW_ENVIRONMENT}"
      kubernetes_cluster: "${KUBERNETES_CLUSTER}"
      log_source: "{{ log_source }}"
