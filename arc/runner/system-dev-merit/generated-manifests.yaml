    spec:
      nodeSelector:
        node.uw.systems/with-stepsecurity-harden-runner: "true"
      securityContext:
        fsGroup: 123
      tolerations:
        - effect: NoSchedule
          key: node.uw.systems/with-stepsecurity-harden-runner
      restartPolicy: Never
      serviceAccountName: system-dev-merit-gha-rs-kube-mode
      containers:
        - name: runner
          command:
            - /bin/bash
            - -c
            - |
              sudo apt-get update
              # build-essential (gcc/g++/make) and python3 are required by node-gyp
              # to compile native node modules when no prebuilt binary is available
              sudo apt-get -y install build-essential python3 gettext-base
              /home/runner/run.sh
          image: ghcr.io/actions/actions-runner:latest
          env:
            - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
              value: "false"
            - name: ACTIONS_RUNNER_CONTAINER_HOOKS
              value: /home/runner/k8s/index.js
            - name: ACTIONS_RUNNER_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
      volumes:
        - name: work
          ephemeral:
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 50Gi
