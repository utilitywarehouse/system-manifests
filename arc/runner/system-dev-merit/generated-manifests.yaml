spec:
  githubConfigUrl: https://github.com/utilitywarehouse
  githubConfigSecret: arc-auth
  runnerScaleSetName: system-dev-merit
  maxRunners: 15
  minRunners: 5
  listenerTemplate:
    metadata:
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
        prometheus.io/scrape: "true"
    spec:
      containers:
        - name: listener
      nodeSelector:
        node.uw.systems/with-stepsecurity-harden-runner: "true"
      tolerations:
        - effect: NoSchedule
          key: node.uw.systems/with-stepsecurity-harden-runner
  listenerMetrics:
