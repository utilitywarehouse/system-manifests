apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - rbac.yaml

patches:
  - patch: |-
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: argocd-image-updater-manager-rolebinding
      subjects:
        - kind: ServiceAccount
          name: argocd-image-updater-controller
          namespace: sys-argocd
