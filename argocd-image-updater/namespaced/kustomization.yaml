apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - upstream/apps.yaml
  - upstream/configMaps.yaml
  - upstream/netpols.yaml
  - upstream/rbac.yaml

patches:
  - path: controller-patch.yaml
  - path: netpol-patch.yaml
  - patch: |-
      $patch: delete
      apiVersion: apps/v1
      kind: Service
      metadata:
        name: argocd-image-updater-controller-metrics-service
